###############################################################################
# Notify Rebase Needed
#
# Gatilho: Push em uma branch release/* (após merge de PR de squad)
# Objetivo: Notificar todas as branches com PRs abertos na mesma release
#           que precisam fazer rebase para manter-se atualizadas
#
# Pré-requisitos:
#   - Nenhum secret adicional necessário (usa GITHUB_TOKEN padrão)
#
# Modelo Release Branch:
#   Quando um PR de squad é mergeado na release branch, os outros PRs
#   abertos para a mesma release precisam de rebase.
#   O workflow de deploy-uat.yml bloqueia deploy se a branch
#   não estiver atualizada, reforçando a necessidade do rebase.
###############################################################################

name: Notify Rebase Needed

on:
  push:
    branches: ['release/*']
    paths:
      - 'force-app/**'

jobs:
  notify:
    name: Notify Open PRs
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find and notify open PRs
        run: |
          RELEASE_BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Release branch: $RELEASE_BRANCH"

          # Identifica o PR que acabou de ser mergeado
          COMMIT_MSG=$(git log -1 --format="%s")
          MERGED_PR=$(echo "$COMMIT_MSG" | grep -oP '#\K[0-9]+' || echo "")

          if [ -n "$MERGED_PR" ]; then
            MERGED_TITLE=$(gh pr view "$MERGED_PR" \
              --repo ${{ github.repository }} \
              --json title -q '.title' 2>/dev/null || echo "$COMMIT_MSG")
            MERGED_AUTHOR=$(gh pr view "$MERGED_PR" \
              --repo ${{ github.repository }} \
              --json author -q '.author.login' 2>/dev/null || echo "unknown")
            MERGED_INFO="PR #$MERGED_PR — $MERGED_TITLE (por @$MERGED_AUTHOR)"
          else
            MERGED_INFO="Commit: $(git log -1 --format='%h %s')"
          fi

          echo "Merge detectado: $MERGED_INFO"

          # Lista PRs abertos para a mesma release branch
          OPEN_PRS=$(gh pr list \
            --repo ${{ github.repository }} \
            --base "$RELEASE_BRANCH" \
            --state open \
            --json number,headRefName,author \
            --jq '.[] | "\(.number)|\(.headRefName)|\(.author.login)"')

          if [ -z "$OPEN_PRS" ]; then
            echo "Nenhum PR aberto para $RELEASE_BRANCH. Nada a notificar."
            exit 0
          fi

          echo "PRs abertos para $RELEASE_BRANCH:"
          echo "$OPEN_PRS"

          # Comenta em cada PR aberto
          echo "$OPEN_PRS" | while IFS='|' read -r pr_num branch author; do
            # Não notifica o PR que acabou de ser mergeado
            if [ "$pr_num" == "$MERGED_PR" ]; then
              continue
            fi

            echo "Notificando PR #$pr_num (branch: $branch, autor: @$author)..."

            gh pr comment "$pr_num" \
              --repo ${{ github.repository }} \
              --body "⚠️ **Rebase necessário**

          Um novo merge foi realizado na \`$RELEASE_BRANCH\`:
          > $MERGED_INFO

          Sua branch \`$branch\` precisa ser atualizada:
          \`\`\`bash
          git fetch origin $RELEASE_BRANCH
          git rebase origin/$RELEASE_BRANCH
          git push --force-with-lease
          \`\`\`

          ⛔ O deploy em UAT será **bloqueado** até o rebase ser concluído."
          done

          echo "✅ Notificações enviadas."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
