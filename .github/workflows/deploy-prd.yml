###############################################################################
# Deploy PRD
#
# Gatilho: Push na branch main (após merge da release branch)
# Objetivo: Deployar o código em produção após todas as validações
#
# Pré-requisitos:
#   - Secret SF_PRD_AUTH_URL com a SFDX Auth URL da org PRD
#   - Environment "PRD" configurado no GitHub com aprovadores
#   - Todas as validações anteriores devem ter passado nos PRs individuais:
#     * CI (dry-run org CI)
#     * 2 code reviews por PR
#     * Deploy UAT bem-sucedido por squad
#     * GMUD aprovada por PR
#   - Release branch mergeada na main pelo Release Manager
#
# Modelo Release Branch:
#   O Release Manager mergeia a release branch (ex: release/2026-05-23)
#   na main no dia do deploy. Esse merge dispara este workflow.
#   A tag inclui quem aprovou, a data e as GMUDs incluídas.
###############################################################################

name: Deploy PRD

on:
  push:
    branches: [main]
    paths:
      - 'force-app/**'

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 120

    # -----------------------------------------------------------------------
    # Environment PRD com aprovadores
    # Configure em: Settings > Environments > PRD > Required reviewers
    # O workflow PARA aqui e aguarda aprovação manual
    # -----------------------------------------------------------------------
    environment: PRD

    steps:
      # -----------------------------------------------------------------
      # 1. Checkout do código (main após merge da release branch)
      # -----------------------------------------------------------------
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------
      # 2. Extrair informações do merge da release branch
      #    Identifica o PR da release, as GMUDs incluídas e quem mergeou
      # -----------------------------------------------------------------
      - name: Extract release info
        id: info
        run: |
          COMMIT_MSG=$(git log -1 --format="%s")
          echo "Commit: $COMMIT_MSG"

          # Identifica o PR da release branch → main
          PR_NUM=$(echo "$COMMIT_MSG" | grep -oP '#\K[0-9]+' || echo "unknown")

          if [ "$PR_NUM" != "unknown" ]; then
            PR_TITLE=$(gh pr view "$PR_NUM" \
              --repo ${{ github.repository }} \
              --json title -q '.title' 2>/dev/null || echo "$COMMIT_MSG")
            MERGED_BY=$(gh pr view "$PR_NUM" \
              --repo ${{ github.repository }} \
              --json mergedBy -q '.mergedBy.login' 2>/dev/null || echo "unknown")

            # Busca todas as GMUDs dos PRs que foram mergeados na release branch
            RELEASE_BRANCH=$(gh pr view "$PR_NUM" \
              --repo ${{ github.repository }} \
              --json headRefName -q '.headRefName' 2>/dev/null || echo "unknown")

            # Lista PRs mergeados na release branch e suas GMUDs
            if [ "$RELEASE_BRANCH" != "unknown" ]; then
              GMUDS=$(gh pr list \
                --repo ${{ github.repository }} \
                --base "$RELEASE_BRANCH" \
                --state merged \
                --json labels \
                --jq '.[].labels[].name' 2>/dev/null | grep -oP 'GMUD-\d+' | sort -u || echo "SEM-GMUD")

              PR_COUNT=$(gh pr list \
                --repo ${{ github.repository }} \
                --base "$RELEASE_BRANCH" \
                --state merged \
                --json number \
                --jq 'length' 2>/dev/null || echo "0")
            else
              GMUDS="SEM-GMUD"
              PR_COUNT="0"
            fi
          else
            PR_TITLE="$COMMIT_MSG"
            MERGED_BY="unknown"
            RELEASE_BRANCH="unknown"
            GMUDS="SEM-GMUD"
            PR_COUNT="0"
          fi

          echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "pr_title=$PR_TITLE" >> "$GITHUB_OUTPUT"
          echo "merged_by=$MERGED_BY" >> "$GITHUB_OUTPUT"
          echo "release_branch=$RELEASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "pr_count=$PR_COUNT" >> "$GITHUB_OUTPUT"

          echo "gmuds<<EOF" >> "$GITHUB_OUTPUT"
          echo "$GMUDS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "========================================"
          echo "Release: $RELEASE_BRANCH"
          echo "PR: #$PR_NUM - $PR_TITLE"
          echo "Mergeado por: $MERGED_BY"
          echo "PRs incluídos: $PR_COUNT"
          echo "GMUDs: $GMUDS"
          echo "========================================"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------
      # 3. Instalar Salesforce CLI
      # -----------------------------------------------------------------
      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      # -----------------------------------------------------------------
      # 4. Autenticar na org PRD
      # -----------------------------------------------------------------
      - name: Authenticate PRD Org
        run: |
          echo "${{ secrets.SF_PRD_AUTH_URL }}" > auth.url
          sf org login sfdx-url --sfdx-url-file auth.url --alias prd-org
          rm -f auth.url

      # -----------------------------------------------------------------
      # 5. Validate (dry-run) em PRD
      #    Executa a validação completa com testes antes do deploy real
      #    Timeout de 120 minutos para orgs grandes
      # -----------------------------------------------------------------
      - name: Validate in PRD (Dry Run)
        run: |
          echo "Iniciando validação em PRD..."
          sf project deploy validate \
            --source-dir force-app \
            --target-org prd-org \
            --test-level RunLocalTests \
            --wait 120

      # -----------------------------------------------------------------
      # 6. Deploy real (quick deploy)
      #    Usa o resultado da validação anterior para deploy instantâneo
      # -----------------------------------------------------------------
      - name: Deploy to PRD (Quick Deploy)
        run: |
          echo "Validação OK. Executando quick deploy..."
          sf project deploy quick \
            --target-org prd-org \
            --use-most-recent

      # -----------------------------------------------------------------
      # 7. Criar tag de deploy para rastreabilidade
      #    Inclui: release branch, aprovador, data, GMUDs e total de PRs
      # -----------------------------------------------------------------
      - name: Tag successful deploy
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          TAG_NAME="prd-$(date +%Y%m%d-%H%M%S)"
          GMUDS="${{ steps.info.outputs.gmuds }}"

          git tag -a "$TAG_NAME" -m "PRD Deploy
          Release: ${{ steps.info.outputs.release_branch }}
          PR: #${{ steps.info.outputs.pr_num }} - ${{ steps.info.outputs.pr_title }}
          Aprovado por: ${{ steps.info.outputs.merged_by }}
          PRs incluídos: ${{ steps.info.outputs.pr_count }}
          GMUDs: $GMUDS
          Data: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          git push origin "$TAG_NAME"

          echo "✅ Tag criada: $TAG_NAME"

      # -----------------------------------------------------------------
      # 8. Comentar no PR da release branch
      # -----------------------------------------------------------------
      - name: Comment deploy result on PR
        if: always()
        run: |
          PR_NUM="${{ steps.info.outputs.pr_num }}"
          if [ "$PR_NUM" == "unknown" ]; then
            exit 0
          fi

          GMUDS="${{ steps.info.outputs.gmuds }}"

          if [ "${{ job.status }}" == "success" ]; then
            gh pr comment "$PR_NUM" \
              --repo ${{ github.repository }} \
              --body "🚀 **Deploy PRD realizado com sucesso!**

          | Item | Detalhe |
          |------|---------|
          | Release | \`${{ steps.info.outputs.release_branch }}\` |
          | Aprovado por | @${{ steps.info.outputs.merged_by }} |
          | PRs incluídos | ${{ steps.info.outputs.pr_count }} |
          | GMUDs | $GMUDS |
          | Tag | \`prd-$(date +%Y%m%d-%H%M%S)\` |
          | Data | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |"
          else
            gh pr comment "$PR_NUM" \
              --repo ${{ github.repository }} \
              --body "❌ **Deploy PRD falhou.**

          Release: \`${{ steps.info.outputs.release_branch }}\`
          GMUDs: $GMUDS
          Verifique os logs do workflow para detalhes.

          **Ação necessária:** Investigar a falha e, se necessário, executar rollback."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
