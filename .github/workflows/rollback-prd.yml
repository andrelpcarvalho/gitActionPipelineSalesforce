###############################################################################
# Rollback PRD
#
# Gatilho: Manual (workflow_dispatch)
# Objetivo: Reverter o merge da release branch na main, desfazendo o deploy
#
# Pré-requisitos:
#   - Secret GH_PAT com Personal Access Token que tenha permissão de push
#     em branches protegidas (necessário para push direto na main)
#   - Environment PRD configurado com aprovadores
#   - A release branch deve ter sido mergeada na main
#
# Modelo Release Branch:
#   O rollback reverte o merge commit da release branch inteira.
#   Isso desfaz TODOS os PRs que estavam na release.
#   O push do revert na main dispara o deploy-prd automaticamente,
#   restaurando o estado anterior em produção.
#
# ATENÇÃO: O rollback reverte a release INTEIRA, não PRs individuais.
#          Para corrigir, as squads devem abrir novos PRs em uma nova
#          release branch com as correções necessárias.
###############################################################################

name: Rollback PRD

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'Número do PR da release branch (ex: 50)'
        required: true
        type: string
      reason:
        description: 'Motivo do rollback'
        required: true
        type: string

jobs:
  rollback:
    name: Rollback Production Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Usa o mesmo environment PRD para exigir aprovação
    environment: PRD

    steps:
      # -----------------------------------------------------------------
      # 1. Checkout com PAT para permitir push na main protegida
      # -----------------------------------------------------------------
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      # -----------------------------------------------------------------
      # 2. Localizar o merge commit da release branch
      # -----------------------------------------------------------------
      - name: Find merge commit
        id: find
        run: |
          echo "Buscando merge commit do PR #${{ inputs.pr_number }}..."

          MERGE_COMMIT=$(gh pr view ${{ inputs.pr_number }} \
            --repo ${{ github.repository }} \
            --json mergeCommit -q '.mergeCommit.oid')

          if [ -z "$MERGE_COMMIT" ]; then
            echo "❌ PR #${{ inputs.pr_number }} não encontrado ou não foi mergeado."
            exit 1
          fi

          PR_TITLE=$(gh pr view ${{ inputs.pr_number }} \
            --repo ${{ github.repository }} \
            --json title -q '.title')
          RELEASE_BRANCH=$(gh pr view ${{ inputs.pr_number }} \
            --repo ${{ github.repository }} \
            --json headRefName -q '.headRefName')
          MERGED_BY=$(gh pr view ${{ inputs.pr_number }} \
            --repo ${{ github.repository }} \
            --json mergedBy -q '.mergedBy.login')

          echo "merge_commit=$MERGE_COMMIT" >> "$GITHUB_OUTPUT"
          echo "pr_title=$PR_TITLE" >> "$GITHUB_OUTPUT"
          echo "release_branch=$RELEASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "merged_by=$MERGED_BY" >> "$GITHUB_OUTPUT"

          echo "========================================"
          echo "PR: #${{ inputs.pr_number }} - $PR_TITLE"
          echo "Release: $RELEASE_BRANCH"
          echo "Mergeado por: $MERGED_BY"
          echo "Merge commit: $MERGE_COMMIT"
          echo "Motivo rollback: ${{ inputs.reason }}"
          echo "========================================"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------
      # 3. Executar o revert do merge commit
      #    -m 1 indica que estamos revertendo um merge commit
      #    e queremos manter a main como parent
      # -----------------------------------------------------------------
      - name: Revert merge commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          echo "Revertendo commit ${{ steps.find.outputs.merge_commit }}..."

          git revert -m 1 ${{ steps.find.outputs.merge_commit }} --no-edit

          # Amend com mensagem detalhada
          git commit --amend -m "revert: rollback ${{ steps.find.outputs.release_branch }} (PR #${{ inputs.pr_number }})

          Motivo: ${{ inputs.reason }}
          Release: ${{ steps.find.outputs.release_branch }}
          Commit revertido: ${{ steps.find.outputs.merge_commit }}
          Merge original por: ${{ steps.find.outputs.merged_by }}
          Rollback executado por: ${{ github.actor }}"

          git push origin main

          echo "✅ Revert commitado e pushado na main."

      # -----------------------------------------------------------------
      # 4. Criar tag de rollback
      # -----------------------------------------------------------------
      - name: Tag rollback
        run: |
          TAG_NAME="rollback-$(echo '${{ steps.find.outputs.release_branch }}' | tr '/' '-')-$(date +%Y%m%d-%H%M%S)"

          git tag -a "$TAG_NAME" -m "Rollback ${{ steps.find.outputs.release_branch }}
          PR: #${{ inputs.pr_number }}
          Motivo: ${{ inputs.reason }}
          Executado por: ${{ github.actor }}"

          git push origin "$TAG_NAME"
          echo "Tag criada: $TAG_NAME"

      # -----------------------------------------------------------------
      # 5. Comentar no PR da release branch
      # -----------------------------------------------------------------
      - name: Notify on PR
        run: |
          gh pr comment ${{ inputs.pr_number }} \
            --repo ${{ github.repository }} \
            --body "🔴 **ROLLBACK EXECUTADO**

          | Item | Detalhe |
          |------|---------|
          | Release | \`${{ steps.find.outputs.release_branch }}\` |
          | Motivo | ${{ inputs.reason }} |
          | Executado por | @${{ github.actor }} |
          | Data | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |

          **Próximos passos:**
          1. Investigar o problema
          2. Criar nova release branch (ex: \`release/hotfix-YYYY-MM-DD\`)
          3. Squads abrem novos PRs com as correções
          4. Passar por todo o fluxo novamente (CI → UAT → GMUD → PRD)

          ⚠️ O push do revert na main disparou automaticamente o deploy PRD
          que vai restaurar o estado anterior em produção."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
